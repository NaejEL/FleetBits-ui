name: Auto-approve Dependabot PRs

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Wait for CI checks to pass
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            
            // Wait for up to 10 minutes for checks to complete
            for (let i = 0; i < 60; i++) {
              const checks = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha
              });
              
              const allPassed = checks.data.check_runs
                .filter(check => !check.name.includes('Skip') && check.name !== 'Auto-approve Dependabot PRs')
                .every(check => check.conclusion === 'success' || check.status !== 'completed');
              
              const anyFailed = checks.data.check_runs
                .filter(check => !check.name.includes('Skip'))
                .some(check => check.conclusion === 'failure');
              
              if (anyFailed) {
                core.setFailed('Security checks failed');
                process.exit(1);
              }
              
              if (allPassed && checks.data.check_runs.length > 0) {
                break;
              }
              
              if (i === 59) {
                core.warning('Checks still pending after 10 minutes');
                break;
              }
              
              await new Promise(resolve => setTimeout(resolve, 10000));
            }

      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Dependabot security checks passed. Auto-approving dependency update.'
            })

      - name: Enable auto-merge
        run: |
          gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
