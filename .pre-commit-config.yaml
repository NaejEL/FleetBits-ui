repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  # Secret scanning — catches tokens, API keys, credentials before they reach git history
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Python security SAST (bandit S-rules)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-r", ".", "-ll", "--exclude", ".venv,tests"]

  # Ruff security lint rules (S-prefix = bandit-equivalent checks)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--select", "S"]

  # Dependency vulnerability scan — catches CVEs before they reach CI (pip-audit)
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (CVE scan)
        language: python
        entry: pip-audit
        args: ["-r", "requirements.txt", "--desc"]
        pass_filenames: false
        files: requirements\.txt
        additional_dependencies: ["pip-audit"]

  # GitHub Actions workflow linter — catches invalid step structure, bad expressions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
